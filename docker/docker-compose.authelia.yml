services:
  backend:
    container_name: dolls-inventory-backend
    environment:
      - AUTH_MODE=forwardauth
      - ALLOW_INSECURE_LOCAL=false
      - DATA_DIR=/data
      - DB_PATH=/data/db/app.sqlite
      - PHOTOS_DIR=/data/photos
      - 'ROLE_GROUPS=[{"role":"admin","groups":["admins"]},{"role":"editor","groups":["family"]},{"role":"viewer","groups":["relatives","friends"]}]'
      - AUTH_HEADER_USER=Remote-User
      - AUTH_HEADER_EMAIL=Remote-Email
      - AUTH_HEADER_GROUPS=Remote-Groups
    image: ghcr.io/${REPO_OWNER:-bronweg}/doll-inventory-backend:latest
    restart: unless-stopped
    volumes:
      - dolls_db:/data/db
      - dolls_photos:/data/photos
  frontend:
    container_name: dolls-inventory-frontend
    depends_on:
      - backend
    environment:
      - VITE_BAGS_COUNT=${VITE_BAGS_COUNT:-3}
    image: ghcr.io/${REPO_OWNER:-bronweg}/doll-inventory-frontend:latest
    ports:
      - ${FRONTEND_PORT:-32123}:80
    restart: unless-stopped
version: '3.8'
volumes:
  dolls_db:
    driver: local
  dolls_photos:
    driver: local
